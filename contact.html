<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Total Onion — questions about our services? Drop us a line.">
    <title>Contact — Total Onion</title>
    <style>
        :root {
            --bg: #ffffff;
            --ink: #111111;
            --accent: #000000;
            --muted: #666666;
            --line: #e2e2e2;
            --error: #111111;
        }
        body { margin:0; padding:96px 48px 48px; background:var(--bg); color:var(--ink); font:16px/1.6 "Helvetica Neue", Arial, sans-serif; }
        h1 { color:var(--accent); font-size:40px; font-weight:800; letter-spacing:-0.5px; margin:0 0 8px; }
        a { color:var(--accent); text-decoration:underline; }

        /* Logo + burger menu (shared with home) */
        .site-logo { position: fixed; top: 20px; left: 20px; width: 50px; height: auto; z-index: 10000; }
        .menu-btn { position: fixed; top: 25px; right: 20px; z-index: 200; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 30px; line-height: 1; padding: 0; background: none; border: none; color: #000; cursor: pointer; transition: transform .25s ease; }
        .menu-btn.is-open { transform: rotate(90deg); }
        .menu {
            position: fixed; top: 60px; right: 20px; z-index: 200; min-width: 230px;
            background: #fff; border: 1px solid var(--accent); padding: 12px 18px;
            opacity: 0; visibility: hidden; transform: translateY(-8px);
            transition: opacity .25s ease, transform .25s ease, visibility .25s;
        }
        .menu.is-open { opacity: 1; visibility: visible; transform: translateY(0); }
        .menu a { display: block; padding: 8px 0; }

        .label {
            display:flex; align-items:center; gap:14px;
            text-transform:uppercase; letter-spacing:2px; font-size:12px; color:var(--muted);
            margin: 28px 0 18px;
        }
        .label::before, .label::after { content:""; height:1px; background:var(--line); flex:1; }

        form { max-width: 480px; }
        .field { margin-bottom: 18px; }
        label { display:block; margin-bottom:6px; font-weight:600; }
        input, textarea {
            width:100%; box-sizing:border-box;
            padding:12px; font-size:15px; font-family:inherit;
            background:#fff; color:var(--ink);
            border:1px solid var(--line); border-radius:0;
        }
        input:focus, textarea:focus { outline:none; border-color:var(--accent); }
        textarea { min-height:120px; resize:vertical; }
        .error { color:var(--error); font-weight:700; font-size:13px; min-height:1em; margin-top:4px; display:block; }
        .field.invalid input, .field.invalid textarea { border:2px solid var(--accent); }

        button {
            padding:12px 30px; font-size:16px; font-weight:600;
            background:var(--accent); color:#fff;
            border:none; border-radius:0; cursor:pointer;
        }
        #success {
            display:none; margin-bottom:20px; padding:14px 16px;
            background:#f4f4f4; border:1px solid var(--accent);
            border-radius:0; color:var(--accent); font-weight:600;
        }
    </style>
</head>
<body>

<img class="site-logo" src="https://totalonion.com/wp-content/uploads/2024/05/onion-logo-black.svg" alt="Total Onion logo">

<button class="menu-btn" onclick="toggleMenu()" aria-label="Open menu" aria-expanded="false">&#9776;</button>
<nav class="menu" id="menu">
    <a href="index.html">Home</a>
    <a href="about.html">QA Terminal</a>
    <a href="products.html">Our Services</a>
    <a href="contact.html">Contact us</a>
    <span style="display:block; font-size:11px; color:#999; text-transform:uppercase; letter-spacing:1px; padding:10px 0 4px;">Total Onion live</span>
    <a href="https://totalonion.com/" target="_blank" rel="noopener">Home</a>
    <a href="https://totalonion.com/services/" target="_blank" rel="noopener">Services</a>
    <a href="https://totalonion.com/case-studies/" target="_blank" rel="noopener">Case studies</a>
    <a href="https://totalonion.com/careers/" target="_blank" rel="noopener">Careers</a>
    <a href="https://totalonion.com/blog/" target="_blank" rel="noopener">Blog</a>
</nav>

<h1>Get in touch</h1>
<p>Questions about our services? Drop us a line.</p>

<div class="label">Send us a message</div>

<div id="success">Thanks — your message has been sent.</div>

<form id="contactForm" novalidate>
    <div class="field" id="field-name">
        <label for="name">Name</label>
        <input id="name" type="text" autocomplete="name">
        <span class="error" id="err-name"></span>
    </div>
    <div class="field" id="field-email">
        <label for="email">Email</label>
        <input id="email" type="text" autocomplete="email">
        <span class="error" id="err-email"></span>
    </div>
    <div class="field" id="field-message">
        <label for="message">Message</label>
        <textarea id="message"></textarea>
        <span class="error" id="err-message"></span>
    </div>
    <button type="submit">Send message</button>
</form>

<script>
const form = document.getElementById('contactForm');
const success = document.getElementById('success');
const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

function setError(field, msg) {
    document.getElementById('err-' + field).textContent = msg;
    document.getElementById('field-' + field).classList.toggle('invalid', !!msg);
    return !msg;
}

function validate() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const message = document.getElementById('message').value.trim();

    let ok = true;
    ok = setError('name', name ? '' : 'Please enter your name.') && ok;
    ok = setError('email',
        !email ? 'Please enter your email.'
        : !EMAIL_RE.test(email) ? 'That email doesn\'t look right.'
        : '') && ok;
    ok = setError('message',
        !message ? 'Please enter a message.'
        : message.length < 10 ? 'Message must be at least 10 characters.'
        : '') && ok;
    return ok;
}

form.addEventListener('submit', function (e) {
    e.preventDefault();
    success.style.display = 'none';
    if (validate()) {
        success.style.display = 'block';
        form.reset();
        ['name','email','message'].forEach(f => setError(f, ''));
    }
});

function toggleMenu() {
    const open = document.getElementById('menu').classList.toggle('is-open');
    const btn = document.querySelector('.menu-btn');
    btn.classList.toggle('is-open');
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
}
</script>

</body>
</html>
