<!DOCTYPE html>
<html>
<head>
    <title>QA Practice</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: white;
            font-family: Arial, sans-serif;
            padding: 40px;
            margin: 0;
        }
        h1 {
            color: #4ade80;
        }
        a {
            color: #4ade80;
        }
        #age-gate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .age-gate-box {
            background-color: #1a1a2e;
            border: 2px solid #4ade80;
            padding: 40px;
            text-align: center;
            max-width: 400px;
        }
        .age-gate-box h2 {
            color: #4ade80;
            margin-top: 0;
        }
        .dob-inputs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 20px 0;
        }
        .dob-inputs input {
            width: 60px;
            font-size: 18px;
            padding: 8px;
            text-align: center;
            border: 1px solid #4ade80;
            background-color: #0f0f1e;
            color: white;
            border-radius: 4px;
        }
        .dob-inputs input.year {
            width: 90px;
        }
        .age-gate-box button {
            font-size: 16px;
            padding: 10px 30px;
            margin-top: 10px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #4ade80;
            color: black;
        }
        #error-msg {
            color: #ef4444;
            min-height: 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="age-gate">
        <div class="age-gate-box">
            <h2>Age Verification</h2>
            <p>Please enter your date of birth.</p>
            <div class="dob-inputs">
                <input type="text" id="day" maxlength="2" placeholder="DD">
                <input type="text" id="month" maxlength="2" placeholder="MM">
                <input type="text" id="year" maxlength="4" class="year" placeholder="YYYY">
            </div>
            <button onclick="checkAge()">Enter site</button>
            <p id="error-msg"></p>
        </div>
    </div>

    <h1>Hello QA Universe</h1>
    <p>This is my QA test page.</p>
    <p><a href="about.html">Go to About page</a></p>

    <script>
        function checkAge() {
            const day = parseInt(document.getElementById('day').value);
            const month = parseInt(document.getElementById('month').value);
            const year = parseInt(document.getElementById('year').value);
            const errorMsg = document.getElementById('error-msg');

            // Validation: all fields filled
            if (!day || !month || !year) {
                errorMsg.textContent = 'Please fill in all fields.';
                return;
            }

            // Validation: sensible ranges
            if (day < 1 || day > 31 || month < 1 || month > 12 || year < 1900 || year > new Date().getFullYear()) {
                errorMsg.textContent = 'Please enter a valid date.';
                return;
            }

            // Calculate age
            const dob = new Date(year, month - 1, day);
            const today = new Date();
            let age = today.getFullYear() - dob.getFullYear();
            const monthDiff = today.getMonth() - dob.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dob.getDate())) {
                age--;
            }

            // Check 18+
            if (age >= 18) {
                document.getElementById('age-gate').style.display = 'none';
            } else {
                document.body.innerHTML = '<h1 style="color: white; text-align: center; margin-top: 100px;">Sorry, you must be 18 or older to view this site.</h1>';
            }
        }
    </script>

</body>
</html>
