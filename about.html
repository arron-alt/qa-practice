<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="About Total Onion — try the QA terminal: reproduce a real-world bug and file it.">
    <title>About — Total Onion QA Terminal</title>
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/opendyslexic">
    <style>
        :root { --accent: #00968f; }
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            color: #111;
            overflow: hidden;
        }

        /* ---------- header / burger menu (consistent across pages) ---------- */
        .site-logo { position: fixed; top: 20px; left: 20px; width: 50px; height: auto; z-index: 10000; }
        .menu-btn { position: fixed; top: 25px; right: 20px; z-index: 300; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 30px; line-height: 1; padding: 0; background: none; border: none; color: #fff; cursor: pointer; transition: transform .25s ease; text-shadow: 0 1px 3px rgba(0,0,0,.5); }
        .menu-btn.is-open { transform: rotate(90deg); }
        .menu {
            position: fixed; top: 60px; right: 20px; z-index: 300; min-width: 230px;
            background: #fff; border: 1px solid #000; padding: 12px 18px;
            opacity: 0; visibility: hidden; transform: translateY(-8px);
            transition: opacity .25s ease, transform .25s ease, visibility .25s;
        }
        .menu.is-open { opacity: 1; visibility: visible; transform: translateY(0); }
        .menu a { display: block; padding: 8px 0; color: #000; text-decoration: none; }
        .menu a:hover { color: var(--accent); }

        /* ---------- office scene ---------- */
        .office { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
        .wall {
            position: absolute; inset: 0 0 34% 0;
            background:
              radial-gradient(120% 90% at 50% 0%, #e7ebee 0%, #d2d9de 55%, #c2cbd1 100%);
        }
        .baseboard { position: absolute; left: 0; right: 0; bottom: 34%; height: 10px; background: #b3bcc2; box-shadow: 0 1px 0 #9aa4ab; }
        .desk {
            position: absolute; left: 0; right: 0; bottom: 0; height: 34%;
            background: linear-gradient(180deg, #6f5743 0%, #5d4836 6%, #6b5340 7%, #5a4634 100%);
            box-shadow: inset 0 8px 18px rgba(0,0,0,.25);
        }
        .desk::before { content:""; position:absolute; top:0; left:0; right:0; height:7px; background: linear-gradient(#caa57e,#9c7a58); }

        /* window with subtle skyline */
        .window {
            position: absolute; top: 9%; left: 6%; width: 230px; height: 150px;
            background: linear-gradient(180deg,#bfe0ef 0%, #d8eef6 60%, #eaf6fb 100%);
            border: 10px solid #e8edf0; border-radius: 4px; box-shadow: 0 6px 18px rgba(0,0,0,.12);
        }
        .window::before { /* skyline */
            content:""; position:absolute; left:0; right:0; bottom:0; height:58%;
            background:
              linear-gradient(90deg, #9fb3bd 0 18px, transparent 18px 34px),
              linear-gradient(90deg, transparent 0 34px, #8ea6b1 34px 64px, transparent 64px),
              linear-gradient(90deg, transparent 0 70px, #a7bac4 70px 96px, transparent 96px),
              linear-gradient(90deg, transparent 0 110px, #8ea6b1 110px 150px, transparent 150px),
              linear-gradient(90deg, transparent 0 158px, #9fb3bd 158px 196px, transparent 196px);
            background-repeat:no-repeat; opacity:.85;
        }
        .window::after { content:""; position:absolute; inset:0; background:
              linear-gradient(#e8edf0,#e8edf0) center/6px 100% no-repeat,
              linear-gradient(#e8edf0,#e8edf0) center/100% 6px no-repeat; }

        /* desk plant */
        .plant { position:absolute; bottom:30%; right:7%; width:64px; height:90px; }
        .plant .pot { position:absolute; bottom:0; left:8px; width:48px; height:38px; background:linear-gradient(#c66b4a,#a4502f); border-radius:4px 4px 8px 8px; }
        .plant .leaf { position:absolute; bottom:30px; left:28px; width:14px; height:52px; background:var(--accent); border-radius:50% 50% 50% 50%/60% 60% 40% 40%; transform-origin:bottom center; opacity:.85; }
        .plant .leaf.l2 { transform:rotate(35deg); } .plant .leaf.l3 { transform:rotate(-35deg); }
        .plant .leaf.l4 { transform:rotate(18deg); height:44px;} .plant .leaf.l5 { transform:rotate(-18deg); height:44px;}

        /* coffee mug */
        .mug { position:absolute; bottom:31%; left:13%; width:42px; height:36px; background:#f3f3f3; border-radius:4px 4px 8px 8px; box-shadow:0 4px 8px rgba(0,0,0,.2);}
        .mug::after { content:""; position:absolute; right:-12px; top:8px; width:14px; height:16px; border:4px solid #f3f3f3; border-left:none; border-radius:0 8px 8px 0;}
        .mug::before { content:"QA"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font:700 12px/1 Arial; color:var(--accent);}

        /* sticky note */
        .sticky { position:absolute; top:11%; right:9%; width:124px; height:118px; background:#ffe27a; transform:rotate(4deg); box-shadow:0 6px 14px rgba(0,0,0,.18); padding:12px; font:600 13px/1.3 "Comic Sans MS",Arial; color:#5b4a00; }
        .sticky b { display:block; font-size:14px; margin-bottom:4px; }

        /* ---------- monitor + terminal ---------- */
        .monitor { position: absolute; left: 50%; top: 49%; transform: translate(-50%, -50%); width: min(720px, 90vw); z-index: 2; }
        .bezel { background: #1b1e21; border: 1px solid #2c3034; border-radius: 14px; padding: 14px; box-shadow: 0 22px 48px rgba(0,0,0,.4); }
        .cam { width: 6px; height: 6px; border-radius: 50%; background: #3a3f44; margin: 0 auto 8px; }
        .screen {
            background: #07100b; border-radius: 6px; height: min(52vh, 420px);
            padding: 14px 16px; overflow-y: auto; position: relative; cursor: text;
            font-family: "Consolas", "SF Mono", "Roboto Mono", monospace; font-size: 14px; line-height: 1.55; color: #c8f7d2;
            box-shadow: inset 0 0 60px rgba(0,0,0,.6), inset 0 0 0 1px #16241b;
        }
        .screen::after { /* faint scanlines */
            content:""; position:absolute; inset:0; pointer-events:none; border-radius:6px;
            background: repeating-linear-gradient(rgba(0,0,0,0) 0 2px, rgba(0,0,0,.06) 2px 3px);
        }
        .line { white-space: pre-wrap; word-break: break-word; }
        .sys  { color: #6f8f7b; }
        .err  { color: #ff9a8c; }
        .warn { color: #ffd27a; }
        .win  { color: #5ef0a0; font-weight: 700; }
        .echo { color: #9fe7c4; }
        .echo .p { color: var(--accent); }
        .input-row { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
        .input-row .p { color: var(--accent); white-space: nowrap; }
        #term-in { flex: 1; background: transparent; border: none; outline: none; color: #c8f7d2; font: inherit; caret-color: #5ef0a0; }
        .stand { width: 110px; height: 42px; margin: 0 auto; background: linear-gradient(#26292c, #14171a); clip-path: polygon(26% 0, 74% 0, 100% 100%, 0 100%); }
        .base  { width: 190px; height: 13px; margin: -1px auto 0; background: #14171a; border-radius: 8px; box-shadow: 0 8px 14px rgba(0,0,0,.3); }

        @media (max-width: 600px) {
            .window, .plant, .mug, .sticky { display: none; }
            .monitor { width: 94vw; top: 47%; }
            .screen { font-size: 12.5px; height: 58vh; }
        }

        /* dyslexia-friendly mode (does not affect the monospace terminal) */
        body.dyslexic { font-family:'OpenDyslexic','Comic Sans MS',sans-serif; letter-spacing:.04em; word-spacing:.14em; }
        /* accessibility & language controls in the menu */
        .menu__controls { border-top:1px solid #ccc; margin-top:8px; padding-top:10px; }
        .menu__controls label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#999; margin:8px 0 4px; }
        .menu__controls select { width:100%; padding:8px; border:1px solid #000; background:#fff; color:#111; border-radius:0; font-size:14px; }
        .menu__controls .toggle-link { cursor:pointer; display:block; padding:5px 0; color:#000; text-decoration:none; }
        .menu__controls .toggle-link:hover { color:var(--accent); }
        .menu__controls .textsize-row { display:flex; gap:6px; margin-top:2px; }
        .menu__controls .textsize-row button { flex:1; padding:6px; border:1px solid #000; background:#fff; color:#111; border-radius:0; cursor:pointer; font-weight:700; }
    </style>
</head>
<body>
    <img class="site-logo" src="https://totalonion.com/wp-content/uploads/2024/05/onion-logo-black.svg" alt="Total Onion logo">
    <button class="menu-btn" onclick="toggleMenu()" aria-label="Open menu" aria-expanded="false">&#9776;</button>
    <nav class="menu" id="menu">
        <a href="index.html" data-i18n="nav.home">Home</a>
        <a href="about.html" data-i18n="nav.qa">QA Terminal</a>
        <a href="products.html" data-i18n="nav.ai">AI in QA</a>
        <a href="contact.html" data-i18n="nav.contact">Contact us</a>
        <span style="display:block; font-size:11px; color:#999; text-transform:uppercase; letter-spacing:1px; padding:10px 0 4px;">Total Onion live</span>
        <a href="https://totalonion.com/" target="_blank" rel="noopener">Home</a>
        <a href="https://totalonion.com/services/" target="_blank" rel="noopener">Services</a>
        <a href="https://totalonion.com/case-studies/" target="_blank" rel="noopener">Case studies</a>
        <a href="https://totalonion.com/careers/" target="_blank" rel="noopener">Careers</a>
        <a href="https://totalonion.com/blog/" target="_blank" rel="noopener">Blog</a>
        <div class="menu__controls">
            <label data-i18n="ctl.lang">Language</label>
            <select id="langSelect" onchange="setLang(this.value)" aria-label="Language">
                <option value="en">English</option>
                <option value="fr">Français</option>
                <option value="es">Español</option>
                <option value="de">Deutsch</option>
            </select>
            <a class="toggle-link" id="dysToggle" onclick="toggleDyslexia()">Dyslexia-friendly text: Off</a>
            <label data-i18n="ctl.text">Text size</label>
            <div class="textsize-row">
                <button type="button" onclick="zoomStep(-1)" aria-label="Smaller text">A&minus;</button>
                <button type="button" onclick="zoomReset()">A</button>
                <button type="button" onclick="zoomStep(1)" aria-label="Larger text">A+</button>
            </div>
            <a class="toggle-link" id="ttsToggle" onclick="toggleTTS()" data-i18n="ctl.tts">&#128266; Read page aloud</a>
        </div>
    </nav>

    <div class="office" aria-hidden="true">
        <div class="wall"></div>
        <div class="window"></div>
        <div class="sticky"><b data-i18n="st.h">QA challenge</b><span data-i18n="st.b">Can you reproduce the bug and file it?</span></div>
        <div class="baseboard"></div>
        <div class="desk"></div>
        <div class="mug"></div>
        <div class="plant"><span class="leaf l1"></span><span class="leaf l2"></span><span class="leaf l3"></span><span class="leaf l4"></span><span class="leaf l5"></span><span class="pot"></span></div>
    </div>

    <div class="monitor">
        <div class="bezel">
            <div class="cam"></div>
            <div class="screen" id="screen">
                <div id="term-out"></div>
                <div class="input-row" id="input-row">
                    <span class="p">qa-trainee@totalonion:~$</span>
                    <input id="term-in" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="Terminal input" disabled>
                </div>
            </div>
        </div>
        <div class="stand"></div>
        <div class="base"></div>
    </div>

    <script>
    function toggleMenu() {
        const open = document.getElementById('menu').classList.toggle('is-open');
        const btn = document.querySelector('.menu-btn');
        btn.classList.toggle('is-open');
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    }

    // ---------- terminal QA game ----------
    const out = document.getElementById('term-out');
    const inp = document.getElementById('term-in');
    const screen = document.getElementById('screen');
    const inputRow = document.getElementById('input-row');

    let step = 0, done = false, wrong = 0, score = 0, precise = 0, erred = false, resets = 0;

    const norm = s => s.trim().toLowerCase().replace(/\s+/g, ' ').replace(/^\//, '').replace(/^open \//, 'open ');

    // Each entry = one user action. full: precise commands (full points) · loose: shorthand (partial credit)
    // pts: points for the precise version · say: lines printed on success · hint: nudge on wrong input
    const stages = [
        { full: ['begin', 'start'], loose: [], pts: 0,
          say: ['> Ticket QA-117 accepted.', '', 'STEP 1 / 4  —  Open the cart.', ['sys', '(stuck? type  help  for the command)']],
          hint: 'Type  begin  to accept the ticket.' },
        { full: ['open cart', 'open /cart'], loose: ['open'], pts: 25,
          say: ['🛒 Cart opened — empty.   Total: £0.00', '', 'STEP 2 / 4  —  Add the 12 YO bottle (£20).'],
          hint: 'Be precise — type the full command:  open /cart' },
        { full: ['add bottle'], loose: ['add', 'add 12yo'], pts: 25,
          say: ['Added: Glenlivet 12 YO  —  £20.00.   Total: £20.00', '', 'STEP 3 / 4  —  Apply discount code SAVE10.'],
          hint: 'Be precise — type the full command:  add bottle' },
        { full: ['apply save10'], loose: ['apply'], pts: 25,
          say: ['Code SAVE10 applied  (−£10.00).   Total: £10.00   ✓ looks correct…', '', ['cmd', 'STEP 4 / 4 — the real test: apply the SAME code again to check it is single-use.']],
          hint: 'Be precise — type the full command:  apply SAVE10' },
        { full: ['apply save10'], loose: ['apply'], pts: 25,
          say: [['warn', '⚠ SAVE10 applied AGAIN  (−£10.00).   Total: £0.00'], ['err', '🐞 The code is NOT single-use — every re-apply keeps deducting (the total will go negative). Bug reproduced.'], '', 'FINAL  —  Log the defect.'],
          hint: 'Be precise — type the full command:  apply SAVE10' },
        { full: ['report bug'], loose: ['report', 'file bug'], pts: 0,
          say: ['__WIN__'],
          hint: 'Type:  report bug' },
    ];

    function print(text, cls) {
        const div = document.createElement('div');
        div.className = 'line' + (cls ? ' ' + cls : '');
        div.textContent = text;
        out.appendChild(div);
        screen.scrollTop = screen.scrollHeight;
    }
    function say(item) {
        if (Array.isArray(item)) print(item[1], item[0] === 'cmd' ? 'sys' : item[0]);
        else print(item);
    }
    function echo(raw) {
        const div = document.createElement('div');
        div.className = 'line echo';
        div.innerHTML = '<span class="p">qa-trainee@totalonion:~$</span> ' + raw.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
        out.appendChild(div);
    }
    function link(text, href) {
        const div = document.createElement('div'); div.className = 'line';
        const a = document.createElement('a'); a.href = href; a.target = '_blank'; a.rel = 'noopener';
        a.textContent = text; a.style.color = '#5ef0a0'; a.style.textDecoration = 'underline';
        div.appendChild(a); out.appendChild(div); screen.scrollTop = screen.scrollHeight;
    }
    function help() {
        if (done) { print('Scenario complete. Type  restart  to play again.', 'sys'); return; }
        const st = stages[step];
        print('💡 ' + st.hint, 'sys');
        print('(other commands:  clear  ·  restart)', 'sys');
    }
    function win() {
        done = true;
        print('', '');
        print('Bug QA-117 filed.    Final score: ' + score + ' / 100     (' + precise + '/4 steps with precise wording)', 'win');
        print('', '');
        if (precise >= 4) {
            print('╔══════════════════════════════════════╗', 'win');
            print('║     ★   EXCELLENT  —  PERFECT RUN  ★    ║', 'win');
            print('╚══════════════════════════════════════╝', 'win');
            print('Outstanding work, QA Engineer.', 'win');
            print('You reproduced the defect AND filed it with the exact wording a developer can act on — no guesswork, no shorthand. That is the standard we hold.', '');
            print('', '');
            print('You clearly understand the fundamentals. Ready for your next step?', 'win');
            link('   →  See where QA can take you:  Careers at Total Onion', 'https://totalonion.com/careers/');
            print('', '');
            print('Type  restart  to play again.', 'sys');
        } else if (score >= 50) {
            print('✅  Bug confirmed & filed — a solid, decent run.', 'win');
            print('You found the defect and logged it. A few steps weren\'t first-time precise, and in QA that precision is exactly where the value is — vague repro wording is what gets a bug bounced back.', '');
            print('Tighten those up for a clean 4/4 and you\'ll unlock the next step.', 'sys');
            print('', '');
            print('Type  restart  to go for a perfect run.', 'sys');
        } else {
            print('⚠  Bug filed — but this is a scrape-through.', 'warn');
            print('You reached the end, but the score shows the precision isn\'t there yet. A report a developer can\'t cleanly reproduce isn\'t much use — that is the bit to nail.', '');
            print('Run it again — use  help  on any step — and aim higher.', 'sys');
            print('', '');
            print('Type  restart  to try again.', 'sys');
        }
    }
    function reset() {
        step = 0; done = false; wrong = 0; score = 0; precise = 0; erred = false; out.innerHTML = '';
        boot();
    }
    function handle(raw) {
        if (!raw.trim()) return;
        echo(raw);
        const n = norm(raw);
        if (n === 'help')   { help(); return; }
        if (n === 'clear')  { out.innerHTML = ''; return; }
        if (n === 'restart'){ resets = 0; reset(); return; }
        if (done) { print('Scenario complete. Type  restart  to play again.', 'sys'); return; }

        const st = stages[step];
        const exact = st.full.includes(n);
        if (exact || st.loose.includes(n)) {
            wrong = 0;
            if (st.say[0] === '__WIN__') { win(); return; }
            if (st.pts > 0) {
                if (exact && !erred) {
                    score += st.pts; precise++;
                    print('   +' + st.pts + ' pts — precise wording ✓     (score ' + score + ')', 'win');
                } else if (exact && erred) {
                    score += 10;
                    print('   +10 pts — correct, but you slipped first. Full marks need a clean first try.     (score ' + score + ')', 'warn');
                } else {
                    const p = Math.round(st.pts * 0.4);
                    score += p;
                    print('   +' + p + ' pts — partial credit. Type the FULL command for full marks.     (score ' + score + ')', 'warn');
                }
            }
            erred = false;
            st.say.forEach(say);
            step++;
        } else {
            wrong++;
            erred = true;
            if (wrong >= 2) {
                resets++;
                const reached = Math.min(4, Math.max(0, step - 1));
                print('✗ Not quite again.', 'err');
                if (resets >= 2) {
                    print('This one is fighting you — and that is genuinely fine. QA is patience, not speed.', 'sys');
                    print('Reminder: type  help  on any step to see the exact command, then walk it through slowly, one precise step at a time.', 'sys');
                    print('Resetting…', 'sys');
                } else {
                    print('No problem — this is exactly how QA is learned. You worked through ' + reached + ' of 4 steps. Resetting…', 'sys');
                    print('Think it through: read the ticket in full, reproduce one precise step at a time, type the exact command, and always test the edge case. Slow is smooth, smooth is fast.', '');
                }
                inp.disabled = true;
                setTimeout(reset, 2600);
            } else {
                print('✗ Not quite. Hint: ' + st.hint, 'err');
            }
        }
        screen.scrollTop = screen.scrollHeight;
    }

    // boot sequence (typed feel)
    function boot() {
        const lines = [
            ['sys', 'TotalOnion QA Terminal  v1.0'],
            ['sys', 'Booting test environment……  ok'],
            ['', ''],
            ['', 'TICKET QA-117'],
            ['', 'Customers report the discount code SAVE10 can be applied repeatedly,'],
            ['', 'driving the order total below £0. Your job: reproduce it, then file it.'],
            ['', ''],
            ['sys', 'Tip: type the FULL, precise command at each step — precision scores higher.'],
            ['sys', 'A perfect 4 / 4 unlocks your next step.'],
            ['', ''],
            ['sys', 'Type  begin  to accept the ticket.   (help for commands)'],
        ];
        let i = 0;
        inp.disabled = true;
        (function next() {
            if (i < lines.length) { say(lines[i]); i++; setTimeout(next, 120); }
            else { inp.disabled = false; inp.focus(); }
        })();
    }

    inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { const v = inp.value; inp.value = ''; handle(v); }
    });
    screen.addEventListener('click', () => { if (!inp.disabled) inp.focus(); });

    boot();

    // ---- accessibility & translation tools ----
    const translations = {
        en: { 'nav.home':'Home','nav.qa':'QA Terminal','nav.ai':'AI in QA','nav.contact':'Contact us',
              'ctl.lang':'Language','ctl.text':'Text size','ctl.tts':'🔊 Read page aloud',
              'st.h':'QA challenge','st.b':'Can you reproduce the bug and file it?' },
        fr: { 'nav.home':'Accueil','nav.qa':'Terminal QA','nav.ai':'L’IA en QA','nav.contact':'Contactez-nous',
              'ctl.lang':'Langue','ctl.text':'Taille du texte','ctl.tts':'🔊 Lire la page',
              'st.h':'Défi QA','st.b':'Pouvez-vous reproduire le bug et le signaler ?' },
        es: { 'nav.home':'Inicio','nav.qa':'Terminal QA','nav.ai':'La IA en QA','nav.contact':'Contáctanos',
              'ctl.lang':'Idioma','ctl.text':'Tamaño del texto','ctl.tts':'🔊 Leer la página',
              'st.h':'Reto de QA','st.b':'¿Puedes reproducir el error y reportarlo?' },
        de: { 'nav.home':'Startseite','nav.qa':'QA-Terminal','nav.ai':'KI in QA','nav.contact':'Kontakt',
              'ctl.lang':'Sprache','ctl.text':'Textgröße','ctl.tts':'🔊 Seite vorlesen',
              'st.h':'QA-Challenge','st.b':'Kannst du den Fehler reproduzieren und melden?' }
    };
    function setLang(l) {
        const t = translations[l] || translations.en;
        document.documentElement.lang = l;
        document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.getAttribute('data-i18n'); if (t[k] != null) el.textContent = t[k]; });
        try { localStorage.setItem('lang', l); } catch (e) {}
        const s = document.getElementById('langSelect'); if (s) s.value = l;
    }
    function updateDys() { const el = document.getElementById('dysToggle'); if (el) el.textContent = document.body.classList.contains('dyslexic') ? 'Dyslexia-friendly text: On' : 'Dyslexia-friendly text: Off'; }
    function toggleDyslexia() { const on = document.body.classList.toggle('dyslexic'); try { localStorage.setItem('dyslexic', on ? '1' : '0'); } catch (e) {} updateDys(); }
    let zoom = 1;
    function applyZoom() { document.documentElement.style.zoom = zoom; try { localStorage.setItem('zoom', String(zoom)); } catch (e) {} }
    function zoomStep(d) { zoom = Math.min(1.6, Math.max(0.8, +(zoom + d * 0.1).toFixed(2))); applyZoom(); }
    function zoomReset() { zoom = 1; applyZoom(); }
    function toggleTTS() {
        const sy = window.speechSynthesis; if (!sy) return;
        if (sy.speaking) { sy.cancel(); return; }
        const parts = [];
        document.querySelectorAll('.sticky, #term-out').forEach(el => {
            if (!el.closest('.menu')) { const t = (el.innerText || '').trim(); if (t) parts.push(t); }
        });
        sy.speak(new SpeechSynthesisUtterance(parts.join('. ') || document.body.innerText));
    }
    (function () {
        try {
