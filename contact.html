<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Total Onion — questions about our services? Drop us a line.">
    <title>Contact — Total Onion</title>
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/opendyslexic">
    <style>
        :root {
            --bg: #ffffff;
            --ink: #111111;
            --accent: #000000;
            --muted: #666666;
            --line: #e2e2e2;
            --error: #111111;
        }
        body { margin:0; padding:96px 48px 48px; background:var(--bg); color:var(--ink); font:16px/1.6 "Helvetica Neue", Arial, sans-serif; }
        h1 { color:var(--accent); font-size:40px; font-weight:800; letter-spacing:-0.5px; margin:0 0 8px; }
        a { color:var(--accent); text-decoration:underline; }

        /* Logo + burger menu (shared with home) */
        .site-logo { position: fixed; top: 20px; left: 20px; width: 50px; height: auto; z-index: 10000; }
        .menu-btn { position: fixed; top: 25px; right: 20px; z-index: 200; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 30px; line-height: 1; padding: 0; background: none; border: none; color: #000; cursor: pointer; transition: transform .25s ease; }
        .menu-btn.is-open { transform: rotate(90deg); }
        .menu {
            position: fixed; top: 60px; right: 20px; z-index: 200; min-width: 230px;
            background: #fff; border: 1px solid var(--accent); padding: 12px 18px;
            opacity: 0; visibility: hidden; transform: translateY(-8px);
            transition: opacity .25s ease, transform .25s ease, visibility .25s;
        }
        .menu.is-open { opacity: 1; visibility: visible; transform: translateY(0); }
        .menu a { display: block; padding: 8px 0; }

        .label {
            display:flex; align-items:center; gap:14px;
            text-transform:uppercase; letter-spacing:2px; font-size:12px; color:var(--muted);
            margin: 28px 0 18px;
        }
        .label::before, .label::after { content:""; height:1px; background:var(--line); flex:1; }

        form { max-width: 480px; }
        .field { margin-bottom: 18px; }
        label { display:block; margin-bottom:6px; font-weight:600; }
        input, textarea {
            width:100%; box-sizing:border-box;
            padding:12px; font-size:15px; font-family:inherit;
            background:#fff; color:var(--ink);
            border:1px solid var(--line); border-radius:0;
        }
        input:focus, textarea:focus { outline:none; border-color:var(--accent); }
        textarea { min-height:120px; resize:vertical; }
        .error { color:var(--error); font-weight:700; font-size:13px; min-height:1em; margin-top:4px; display:block; }
        .field.invalid input, .field.invalid textarea { border:2px solid var(--accent); }

        button {
            padding:12px 30px; font-size:16px; font-weight:600;
            background:var(--accent); color:#fff;
            border:none; border-radius:0; cursor:pointer;
        }
        #success {
            display:none; margin-bottom:20px; padding:14px 16px;
            background:#f4f4f4; border:1px solid var(--accent);
            border-radius:0; color:var(--accent); font-weight:600;
        }

        /* dyslexia-friendly mode */
        body.dyslexic { font-family:'OpenDyslexic','Comic Sans MS',sans-serif; letter-spacing:.04em; word-spacing:.14em; line-height:1.9; }
        /* accessibility & language controls in the menu */
        .menu__controls { border-top:1px solid var(--line); margin-top:8px; padding-top:10px; }
        .menu__controls label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#999; margin:8px 0 4px; }
        .menu__controls select { width:100%; padding:8px; border:1px solid var(--accent); background:#fff; color:var(--ink); border-radius:0; font-size:14px; }
        .menu__controls .toggle-link { cursor:pointer; display:block; padding:5px 0; text-decoration:none; }
        .menu__controls .textsize-row { display:flex; gap:6px; margin-top:2px; }
        .menu__controls .textsize-row button { flex:1; padding:6px; border:1px solid var(--accent); background:#fff; color:var(--ink); border-radius:0; cursor:pointer; font-weight:700; }
    </style>
</head>
<body>

<img class="site-logo" src="https://totalonion.com/wp-content/uploads/2024/05/onion-logo-black.svg" alt="Total Onion logo">

<button class="menu-btn" onclick="toggleMenu()" aria-label="Open menu" aria-expanded="false">&#9776;</button>
<nav class="menu" id="menu">
    <a href="index.html" data-i18n="nav.home">Home</a>
    <a href="about.html" data-i18n="nav.qa">QA Terminal</a>
    <a href="products.html" data-i18n="nav.ai">AI in QA</a>
    <a href="contact.html" data-i18n="nav.contact">Contact us</a>
    <span style="display:block; font-size:11px; color:#999; text-transform:uppercase; letter-spacing:1px; padding:10px 0 4px;">Total Onion live</span>
    <a href="https://totalonion.com/" target="_blank" rel="noopener">Home</a>
    <a href="https://totalonion.com/services/" target="_blank" rel="noopener">Services</a>
    <a href="https://totalonion.com/case-studies/" target="_blank" rel="noopener">Case studies</a>
    <a href="https://totalonion.com/careers/" target="_blank" rel="noopener">Careers</a>
    <a href="https://totalonion.com/blog/" target="_blank" rel="noopener">Blog</a>
    <div class="menu__controls">
        <label data-i18n="ctl.lang">Language</label>
        <select id="langSelect" onchange="setLang(this.value)" aria-label="Language">
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="de">Deutsch</option>
        </select>
        <a class="toggle-link" id="dysToggle" onclick="toggleDyslexia()">Dyslexia-friendly text: Off</a>
        <label data-i18n="ctl.text">Text size</label>
        <div class="textsize-row">
            <button type="button" onclick="zoomStep(-1)" aria-label="Smaller text">A&minus;</button>
            <button type="button" onclick="zoomReset()">A</button>
            <button type="button" onclick="zoomStep(1)" aria-label="Larger text">A+</button>
        </div>
        <a class="toggle-link" id="ttsToggle" onclick="toggleTTS()" data-i18n="ctl.tts">&#128266; Read page aloud</a>
    </div>
</nav>

<h1 data-i18n="c.h1">Get in touch</h1>
<p data-i18n="c.sub">Questions about our services? Drop us a line.</p>

<div class="label" data-i18n="c.label">Send us a message</div>

<div id="success" data-i18n="c.success">Thanks — your message has been sent.</div>

<form id="contactForm" novalidate>
    <div class="field" id="field-name">
        <label for="name" data-i18n="c.name">Name</label>
        <input id="name" type="text" autocomplete="name">
        <span class="error" id="err-name"></span>
    </div>
    <div class="field" id="field-email">
        <label for="email" data-i18n="c.email">Email</label>
        <input id="email" type="text" autocomplete="email">
        <span class="error" id="err-email"></span>
    </div>
    <div class="field" id="field-message">
        <label for="message" data-i18n="c.msg">Message</label>
        <textarea id="message"></textarea>
        <span class="error" id="err-message"></span>
    </div>
    <button type="submit" data-i18n="c.send">Send message</button>
</form>

<script>
const form = document.getElementById('contactForm');
const success = document.getElementById('success');
const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

function setError(field, msg) {
    document.getElementById('err-' + field).textContent = msg;
    document.getElementById('field-' + field).classList.toggle('invalid', !!msg);
    return !msg;
}

function validate() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const message = document.getElementById('message').value.trim();

    let ok = true;
    ok = setError('name', name ? '' : 'Please enter your name.') && ok;
    ok = setError('email',
        !email ? 'Please enter your email.'
        : !EMAIL_RE.test(email) ? 'That email doesn\'t look right.'
        : '') && ok;
    ok = setError('message',
        !message ? 'Please enter a message.'
        : message.length < 10 ? 'Message must be at least 10 characters.'
        : '') && ok;
    return ok;
}

form.addEventListener('submit', function (e) {
    e.preventDefault();
    success.style.display = 'none';
    if (validate()) {
        success.style.display = 'block';
        form.reset();
        ['name','email','message'].forEach(f => setError(f, ''));
    }
});

function toggleMenu() {
    const open = document.getElementById('menu').classList.toggle('is-open');
    const btn = document.querySelector('.menu-btn');
    btn.classList.toggle('is-open');
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
}

// ---- accessibility & translation tools ----
const translations = {
    en: { 'nav.home':'Home','nav.qa':'QA Terminal','nav.ai':'AI in QA','nav.contact':'Contact us',
          'ctl.lang':'Language','ctl.text':'Text size','ctl.tts':'🔊 Read page aloud',
          'c.h1':'Get in touch','c.sub':'Questions about our services? Drop us a line.','c.label':'Send us a message',
          'c.success':'Thanks — your message has been sent.','c.name':'Name','c.email':'Email','c.msg':'Message','c.send':'Send message' },
    fr: { 'nav.home':'Accueil','nav.qa':'Terminal QA','nav.ai':'L’IA en QA','nav.contact':'Contactez-nous',
          'ctl.lang':'Langue','ctl.text':'Taille du texte','ctl.tts':'🔊 Lire la page',
          'c.h1':'Prenez contact','c.sub':'Des questions sur nos services ? Écrivez-nous.','c.label':'Envoyez-nous un message',
          'c.success':'Merci — votre message a été envoyé.','c.name':'Nom','c.email':'E-mail','c.msg':'Message','c.send':'Envoyer' },
    es: { 'nav.home':'Inicio','nav.qa':'Terminal QA','nav.ai':'La IA en QA','nav.contact':'Contáctanos',
          'ctl.lang':'Idioma','ctl.text':'Tamaño del texto','ctl.tts':'🔊 Leer la página',
          'c.h1':'Ponte en contacto','c.sub':'¿Preguntas sobre nuestros servicios? Escríbenos.','c.label':'Envíanos un mensaje',
          'c.success':'Gracias — tu mensaje ha sido enviado.','c.name':'Nombre','c.email':'Correo','c.msg':'Mensaje','c.send':'Enviar mensaje' },
    de: { 'nav.home':'Startseite','nav.qa':'QA-Terminal','nav.ai':'KI in QA','nav.contact':'Kontakt',
          'ctl.lang':'Sprache','ctl.text':'Textgröße','ctl.tts':'🔊 Seite vorlesen',
          'c.h1':'Kontakt aufnehmen','c.sub':'Fragen zu unseren Leistungen? Schreiben Sie uns.','c.label':'Senden Sie uns eine Nachricht',
          'c.success':'Danke — Ihre Nachricht wurde gesendet.','c.name':'Name','c.email':'E-Mail','c.msg':'Nachricht','c.send':'Nachricht senden' }
};
function setLang(l) {
    const t = translations[l] || translations.en;
    document.documentElement.lang = l;
    document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.getAttribute('data-i18n'); if (t[k] != null) el.textContent = t[k]; });
    try { localStorage.setItem('lang', l); } catch (e) {}
    const s = document.getElementById('langSelect'); if (s) s.value = l;
}
function updateDys() { const el = document.getElementById('dysToggle'); if (el) el.textContent = document.body.classList.contains('dyslexic') ? 'Dyslexia-friendly text: On' : 'Dyslexia-friendly text: Off'; }
function toggleDyslexia() { const on = document.body.classList.toggle('dyslexic'); try { localStorage.setItem('dyslexic', on ? '1' : '0'); } catch (e) {} updateDys(); }
let zoom = 1;
function applyZoom() { document.documentElement.style.zoom = zoom; try { localStorage.setItem('zoom', String(zoom)); } catch (e) {} }
function zoomStep(d) { zoom = Math.min(1.6, Math.max(0.8, +(zoom + d * 0.1).toFixed(2))); applyZoom(); }
function zoomReset() { zoom = 1; applyZoom(); }
function toggleTTS() {
    const sy = window.speechSynthesis; if (!sy) return;
    if (sy.speaking) { sy.cancel(); return; }
    const parts = [];
    document.querySelectorAll('h1, [data-i18n="c.sub"], .label, #contactForm').forEach(el => {
        if (!el.closest('.menu')) { const t = (el.innerText || '').trim(); if (t) parts.push(t); }
    });
    sy.speak(new SpeechSynthesisUtterance(parts.join('. ') || document.body.innerText));
}
(function () {
    try {
        const l = localStorage.getItem('lang'); if (l) setLang(l);
        if (localStorage.getItem('dyslexic') === '1') document.body.classList.add('dyslexic');
        const z = parseFloat(localStorage.getItem('zoom')); if (z) { zoom = z; applyZoom(); }
    } catch (e) {}
    updateDys();
})();
</script>

</body>
</html>
